apiVersion: apps/v1
kind: Deployment
metadata:
  name: broadcaster-deployment
  labels:
    app: broadcaster
spec:
  replicas: 1
  selector:
    matchLabels:
      app: broadcaster
  template:
    metadata:
      labels:
        app: broadcaster
    spec:
      containers:
        - name: broadcaster
          image: cithit/valachmr:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10

---
apiVersion: v1
kind: Service
metadata:
  name: broadcaster-service
spec:
  type: LoadBalancer
  loadBalancerIP: 10.48.228.123
  ports:
  - protocol: TCP
    port: 8080
    targetPort: 8080
  selector:
    app: broadcaster

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: broadcaster-ingress
  annotations:
    nginx.ingress.kubernetes.io/proxy-buffering: "off"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
spec:
  rules:
  - http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: broadcaster-service
            port:
              number: 8080
